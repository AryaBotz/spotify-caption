<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spotify Caption MVP</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:700px;
margin:auto;
padding:20px;
}

button{
padding:10px 20px;
margin-top:10px;
}

#result{
margin-top:20px;
padding:15px;
border:1px solid #ccc;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Spotify Caption MVP</h2>

<input type="file" id="audioFile">

<br>

<button onclick="uploadAudio()">
Transcribe
</button>

<div id="result">
Waiting...
</div>

<script>

async function uploadAudio(){

const file =
document.getElementById("audioFile").files[0];

if(!file){
alert("Select audio first");
return;
}

const formData =
new FormData();

formData.append("audio",file);

document.getElementById("result").innerText =
"Processing...";

try{

const response =
await fetch("/api/transcribe",{
method:"POST",
body:formData
});

const data =
await response.json();

document.getElementById("result").innerText =
data.text || JSON.stringify(data,null,2);

}
catch(error){

document.getElementById("result").innerText =
error.message;

}

}

</script>

</body>
</html>
